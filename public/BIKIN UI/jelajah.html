      .carousel-item img {

        object-fit: cover;

        width: 150px; 
        height: 70px;

        background-color: red; 
        border-radius: 30px;
        border: none;
        transition: 0.3s;
      }

      .button1:hover {
        background-color: darkred;
        color: white;
      }

      /* Responsif Khusus HP */
      @media (max-width: 768px) {
        .carousel-item img {
          height: 400px; /* Tinggi dikurangi di HP agar proporsional */
        }
        
        .button1 {
          width: 120px;
          height: 50px;
          font-size: 18px; /* Tombol mengecil sedikit di HP */
        }

        .carousel-caption h3 {
          font-size: 1.2rem; /* Ukuran teks judul mengecil di HP */
        }

      /* Perbaikan Footer agar rapi di HP */

        padding: 20px;
        background-color: rgba(0, 0, 0, 0.05);
